services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: onca_backend
    ports:
      - "8084:8000"
    volumes:
      - ./src:/app/src
      - ./frontend/static/data:/app/data
    environment:
      - PYTHONPATH=/app
    networks:
      - onca_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: onca_frontend
    ports:
      - "8085:5001"
    volumes:
      - ./frontend:/app/frontend
      - ./src:/app/src
    environment:
      - PYTHONPATH=/app
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - onca_network
    restart: unless-stopped

networks:
  onca_network:
    driver: bridge

volumes:  
  data_volume:
